<div class="p-4 animate-fade-in">
  <p-card header="Configuración de Sistema" subheader="Vincule los turnos permitidos al servicio seleccionado">
    
    <div class="flex flex-column gap-4">
      <div class="flex flex-column gap-2">
        <label class="font-bold text-sm text-600 uppercase">Servicio a Configurar</label>
        <div class="flex flex-wrap gap-3">
          <p-select 
            [options]="servicios()" 
            [(ngModel)]="servicioIdSeleccionado" 
            optionLabel="nombre" 
            optionValue="id"
            placeholder="Seleccione un servicio" 
            class="w-full md:w-30rem"
            (onChange)="cargarConfiguracionActual()">
          </p-select>
          
           <p-button 
            label="Áreas" 
            icon="pi pi-map" 
            severity="info"
            [disabled]="!servicioIdSeleccionado()"
            (onClick)="abrirModalNuevaArea()">
          </p-button>
          
          <p-button 
            label="Guardar Configuración" 
            icon="pi pi-save" 
            severity="success"
            [loading]="cargando()" 
            (onClick)="guardar()"
            [disabled]="!servicioIdSeleccionado">
          </p-button>
        </div>
      </div>

      <p-divider></p-divider>

      <p-table 
        #dt 
        [value]="turnosDisponibles()" 
        [rows]="5" 
        [paginator]="true" 
        [globalFilterFields]="['nombre_turno', 'duracion_horas']"
        responsiveLayout="scroll"
        [rowHover]="true" 
        dataKey="id"
        styleClass="p-datatable-sm p-datatable-gridlines shadow-1 border-round overflow-hidden">

        <ng-template pTemplate="caption">
          <div class="flex align-items-center justify-content-between flex-wrap gap-2">
            <div class="flex align-items-center gap-3">
              <span class="text-xl font-bold text-800">Catálogo de Turnos</span>
              
                <p-button 
                label="Desmarcar Todo" 
                icon="pi pi-filter-slash" 
                [outlined]="true" 
                severity="secondary" 
                size="small"
                (onClick)="limpiarSeleccion()"
                [disabled]="turnosSeleccionadosIds().length === 0">
              </p-button>
              <p-button 
                label="Nuevo Turno" 
                icon="pi pi-plus" 
                severity="help" 
                size="small"
                (onClick)="abrirModalNuevoTurno()">
              </p-button>

            </div>

            <p-iconfield iconPosition="left" class="ml-auto w-full md:w-auto">
              <p-inputicon styleClass="pi pi-search"></p-inputicon>
              <input 
                pInputText 
                type="text" 
                (input)="dt.filterGlobal($any($event.target).value, 'contains')" 
                placeholder="Buscar turno..." 
                class="w-full p-inputtext-sm" />
            </p-iconfield>
          </div>
        </ng-template>

        <ng-template pTemplate="header">
          <tr>
            <th style="width: 4rem" class="text-center">Habilitar</th>
            <th pSortableColumn="nombre_turno">Nombre <p-sortIcon field="nombre_turno"></p-sortIcon></th>
            <th>Horario</th>
            <th pSortableColumn="duracion_horas" class="text-center">Duración <p-sortIcon field="duracion_horas"></p-sortIcon></th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-turno>
          <tr [ngClass]="{'bg-selected-row': turnosSeleccionadosIds().includes(turno.id)}">
            <td class="text-center">
              <p-checkbox 
                [value]="turno.id" 
                [(ngModel)]="turnosSeleccionadosIds"
                [inputId]="'t' + turno.id">
              </p-checkbox>
            </td>
            <td>
              <label [for]="'t' + turno.id" class="cursor-pointer font-bold uppercase text-sm block">
                {{ turno.nombre_turno }}
              </label>
            </td>
            <td>
              <div class="flex align-items-center gap-2 text-600">
                <i class="pi pi-clock text-primary"></i>
                <span>{{ turno.hora_inicio }} — {{ turno.hora_fin }}</span>
              </div>
            </td>
            <td class="text-center">
              <span *ngIf="turno.duracion_horas" class="badge-horas px-2 py-1 border-round font-bold">
                {{ turno.duracion_horas }}h
              </span>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="4" class="text-center p-4 text-500">
              No se encontraron turnos.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div> </p-card>

    <p-dialog 
  header="Nuevo Tipo de Turno" 
  [(visible)]="mostrarModalCrear" 
  [modal]="true" 
  [style]="{ width: '400px' }"
  [draggable]="false"
  [resizable]="false"
  styleClass="p-fluid">
  
  <div class="flex flex-column gap-3 mt-2">
    <div class="field">
      <label class="font-bold text-sm text-600">Nombre del Turno</label>
      <input pInputText [(ngModel)]="nuevoTurno().nombre_turno" placeholder="Ej: Mañana (07:00 - 13:00)" />
    </div>

    <div class="flex flex-column gap-2 mb-3">
  <label style="font-weight: bold;">Categoría a la que pertenece</label>
  <p-select 
    [options]="categoriasDisponibles()" 
    [(ngModel)]="nuevoTurno().categoria_id"
    optionLabel="nombre" 
    optionValue="id" 
    placeholder="Seleccione una Categoría"
    [style]="{'width':'100%'}">
  </p-select>
</div>

    <div class="flex gap-3">
      <div class="field flex-1">
        <label class="font-bold text-sm text-600">Hora Inicio</label>
        <input 
          pInputText 
          type="time" 
          [(ngModel)]="nuevoTurno().hora_inicio" 
          (ngModelChange)="onHoraChange()" />
      </div>
      <div class="field flex-1">
        <label class="font-bold text-sm text-600">Hora Fin</label>
        <input 
          pInputText 
          type="time" 
          [(ngModel)]="nuevoTurno().hora_fin" 
          (ngModelChange)="onHoraChange()" />
      </div>
    </div>

    <div class="field">
      <label class="font-bold text-sm text-600">Duración Calculada</label>
      <div class="p-inputgroup">
        <input 
          pInputText 
          type="number" 
          [ngModel]="nuevoTurno().duracion_horas" 
          readonly 
          class="bg-gray-100 font-bold text-primary" />
        <span class="p-inputgroup-addon">Hrs</span>
      </div>
      
      <small *ngIf="nuevoTurno().hora_inicio && nuevoTurno().hora_fin && nuevoTurno().hora_fin <= nuevoTurno().hora_inicio" 
             class="text-orange-500 font-medium block mt-1">
        <i class="pi pi-moon mr-1"></i> Turno nocturno detectado.
      </small>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button 
      label="Cancelar" 
      icon="pi pi-times" 
      text 
      severity="secondary" 
      (onClick)="mostrarModalCrear.set(false)">
    </p-button>
    
    <p-button 
      label="Guardar" 
      icon="pi pi-check" 
      [loading]="cargando()" 
      (onClick)="guardarNuevoTurno()">
    </p-button>
  
  </ng-template>
</p-dialog>
  
<p-dialog 
  header="Áreas del Servicio" 
  [(visible)]="mostrarModalArea" 
  [modal]="true" 
  [style]="{ width: '450px' }">
  
  <div class="p-fluid">
    <div class="field mb-3">
      <input pInputText [(ngModel)]="nuevaArea().nombre" placeholder="Nombre de nueva área" class="mb-2" />
      
   <p-select 
  [options]="categoriasDisponibles()" 
  [(ngModel)]="nuevaArea().categoria_id" 
  optionLabel="nombre" 
  optionValue="id" 
  placeholder="Seleccione una categoría">
</p-select>

      <p-button label="Agregar" icon="pi pi-plus" (onClick)="guardarNuevaArea()"></p-button>
    </div>

    <div class="field">
      <label>Áreas actuales:</label>
      <div class="list-none p-0 m-0 border-1 border-round border-300">
        <div *ngFor="let area of areasDelServicio()" class="p-2 border-bottom-1 border-300 flex justify-content-between align-items-center">
          <div>
            <strong>{{ area.nombre }}</strong>
            <div class="text-sm text-500">{{ area.categoria?.nombre }}</div>
          </div>
          <i class="pi pi-trash text-red-500 cursor-pointer" (click)="eliminarArea(area.id)"></i>
        </div>
      </div>
    </div>
  </div>
</p-dialog>


</div>
