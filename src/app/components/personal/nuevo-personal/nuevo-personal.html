<div class="container-fluid py-4">
  <form class="shadow-lg p-4 bg-white rounded-4 mx-lg-5">
    
    <div class="p-3 mb-4 rounded-3 border-start border-4 border-info bg-light">
      <h6 class="text-info fw-bold mb-3">Acceso al Sistema</h6>
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label small fw-bold">Usuario (Login)</label>
          <input type="text" name="u_name" [(ngModel)]="nuevoUsuario.name" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Email</label>
          <input type="email" name="u_email" [(ngModel)]="nuevoUsuario.email" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Contraseña</label>
          <input type="password" name="u_pass" [(ngModel)]="nuevoUsuario.password" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Confirmar Contraseña</label>
          <input type="password" name="u_conf" [(ngModel)]="nuevoUsuario.password_confirmation" class="form-control form-control-sm">
        </div>
      </div>
    </div>

    <div class="p-3 mb-4 rounded-3 border-start border-4 border-success bg-light">
      <h6 class="text-success fw-bold mb-3">Información Personal</h6>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label small fw-bold">Nombre Completo</label>
          <input type="text" name="p_nom" [(ngModel)]="nuevoUsuario.persona.nombre_completo" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">C.I.</label>
          <input type="text" name="p_ci" [(ngModel)]="nuevoUsuario.persona.carnet_identidad" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Género</label>
          <select name="p_gen" [(ngModel)]="nuevoUsuario.persona.genero" class="form-select form-select-sm">
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">F. Nacimiento</label>
          <input type="date" name="p_fec" [(ngModel)]="nuevoUsuario.persona.fecha_nacimiento" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Teléfono</label>
          <input type="text" name="p_tel" [(ngModel)]="nuevoUsuario.persona.telefono" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Nacionalidad</label>
          <input type="text" name="p_nac" [(ngModel)]="nuevoUsuario.persona.nacionalidad" class="form-control form-control-sm">
        </div>
        <div class="col-md-12">
          <label class="form-label small fw-bold">Dirección de Domicilio</label>
          <input type="text" name="p_dir" [(ngModel)]="nuevoUsuario.persona.direccion" class="form-control form-control-sm">
        </div>
      </div>
    </div>

    <div class="p-3 mb-4 rounded-3 border-start border-4 border-warning bg-light">
      <h6 class="text-warning fw-bold mb-3">Gestión Administrativa</h6>
      <div class="row g-3">
        <div class="col-md-3">
          <label class="form-label small fw-bold">Categoría / Cargo</label>
          <select name="p_trab" [(ngModel)]="nuevoUsuario.persona.tipo_trabajador" class="form-select form-select-sm">
            <option value="Medico">Médicos</option>
            <option value="Enfermera">Enfermera</option>
            <option value="Manual">Manual</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Tipo de Salario</label>
          <select name="p_tsal" [(ngModel)]="nuevoUsuario.persona.tipo_salario" class="form-select form-select-sm">
            <option value="TGN">TGN</option>
            <option value="Propio">Propios</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Monto Salario (Bs.)</label>
          <input type="number" name="p_sueldo" [(ngModel)]="nuevoUsuario.persona.numero_tipo_salario" class="form-control form-control-sm">
        </div>
        <div class="col-md-3">
          <label class="form-label small fw-bold">Rol del Sistema</label>
          <select name="u_rol" [(ngModel)]="rolSeleccionadoNombre" class="form-select form-select-sm">
            <option *ngFor="let r of listaRoles" [value]="r.name">{{ r.name | uppercase }}</option>
          </select>
        </div>
      </div>
    </div>

    <div class="text-end mt-4">
      <button type="button" (click)="guardar()" class="btn btn-success px-5 shadow">REGISTRAR AHORA</button>
    </div>
  </form>
</div>
