<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">Registro de Nuevo Personal</h5>
        </div>
        <div class="card-body">
            <form (ngSubmit)="guardar()">
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Nombre de Usuario (Login)</label>
                        <input type="text" class="form-control" [(ngModel)]="nuevoUsuario.name" name="name" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Correo Electrónico</label>
                        <input type="email" class="form-control" [(ngModel)]="nuevoUsuario.email" name="email" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" class="form-control" [(ngModel)]="nuevoUsuario.password" name="password" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Rol en el Sistema</label>
                        <select class="form-select" [(ngModel)]="rolSeleccionadoNombre" name="rolSeleccionadoNombre">
                            <option *ngFor="let rol of listaRoles" [value]="rol.name">
                                {{ rol.name | uppercase }}
                            </option>
                        </select>
                    </div>
                </div>

                <hr>

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold">Nombre Completo</label>
                        <input type="text" class="form-control" [(ngModel)]="nuevoUsuario.persona.nombre_completo" name="nombre_completo">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">C.I. (Carnet de Identidad)</label>
                        <input type="text" class="form-control" [(ngModel)]="nuevoUsuario.persona.carnet_identidad" name="carnet_identidad">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Fecha de Nacimiento</label>
                        <input type="date" class="form-control" [(ngModel)]="nuevoUsuario.persona.fecha_nacimiento" name="fecha_nacimiento">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Género</label>
                        <select class="form-select" [(ngModel)]="nuevoUsuario.persona.genero" name="genero">
                            <option value="M">Masculino</option>
                            <option value="F">Femenino</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Teléfono</label>
                        <input type="text" class="form-control" [(ngModel)]="nuevoUsuario.persona.telefono" name="telefono">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Categoría / Cargo</label>
                        <select class="form-select" [(ngModel)]="nuevoUsuario.categoria_id" name="categoria_id">
                            <option [ngValue]="null" disabled>Seleccione una categoría...</option>
                            <option *ngFor="let cat of listaCategorias" [value]="cat.id">
                                {{ cat.nombre }}
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Tipo de Trabajador</label>
                        <select class="form-select" [(ngModel)]="nuevoUsuario.persona.tipo_trabajador" name="tipo_trabajador">
                            <option *ngFor="let t of listaTiposTrabajador" [value]="t.id">
                                {{ t.nombre }}
                            </option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Fuente de Salario</label>
                        <select class="form-select" [(ngModel)]="nuevoUsuario.persona.tipo_salario" name="tipo_salario">
                            <option *ngFor="let s of listaTiposSalario" [value]="s.id">
                                {{ s.nombre }}
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">N° Tipo Salario (Ítem/Contrato)</label>
                        <input type="number" class="form-control" [(ngModel)]="nuevoUsuario.persona.numero_tipo_salario" name="numero_tipo_salario">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Dirección de Domicilio</label>
                    <input type="text" class="form-control" [(ngModel)]="nuevoUsuario.persona.direccion" name="direccion">
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <button type="button" class="btn btn-secondary" [routerLink]="['/dashboard/personal']">Cancelar</button>
                    <button type="submit" class="btn btn-success">Registrar Ahora</button>
                </div>

            </form>
        </div>
    </div>
</div>
