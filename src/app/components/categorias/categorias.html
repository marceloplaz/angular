<div class="container-fluid py-4 bg-light">
  <div class="row">
    
    <div class="col-md-3">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white py-3">
          <h6 class="mb-0 fw-bold text-primary">
            <i class="fas fa-plus-circle me-2"></i>Nueva Categoría
          </h6>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Nombre de Categoría</label>
            <input type="text" class="form-control form-control-sm" [(ngModel)]="nuevaCat.nombre" placeholder="Ej: Especialistas">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Nivel Jerárquico</label>
            <input type="number" class="form-control form-control-sm" [(ngModel)]="nuevaCat.nivel" min="1" max="10">
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Descripción (Opcional)</label>
            <textarea class="form-control form-control-sm" [(ngModel)]="nuevaCat.descripcion" rows="2"></textarea>
          </div>
          <button class="btn btn-primary btn-sm w-100 shadow-sm" (click)="guardar()">
            <i class="fas fa-save me-1"></i> Guardar Registro
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-9">
      <div class="row">
        
        <div class="col-md-4 mb-4" *ngFor="let cat of categorias">
          <div class="card border-0 shadow-sm h-100">
            
            <div class="card-header text-white d-flex justify-content-between align-items-center py-3"
                 [ngStyle]="{'background-color': getColor(cat.id)}">
              <h6 class="mb-0 small fw-bold text-uppercase">
                <i class="fas fa-layer-group me-2"></i>{{ cat.nombre }}
              </h6>
              <span class="badge bg-white text-dark rounded-pill">
                {{ obtenerUsuariosPorCat(cat.id).length }}
              </span>
            </div>

            <div class="list-group list-group-flush" style="max-height: 400px; overflow-y: auto;">
              
              <div *ngFor="let u of obtenerUsuariosPorCat(cat.id)" class="list-group-item list-group-item-action border-0 border-bottom">
                <div class="d-flex align-items-center">
                  <div class="avatar-circle me-3 text-center" [ngStyle]="{'background-color': getColorLight(cat.id)}">
                    <i class="fas fa-user small" [ngStyle]="{'color': getColor(cat.id)}"></i>
                  </div>
                  
                  <div>
                    <div class="fw-bold text-dark small text-capitalize">{{ u.name }}</div>
                    <div class="text-muted" style="font-size: 0.72rem;">
                      <i class="fas fa-id-card me-1"></i>CI: {{ u.persona?.carnet_identidad || 'N/A' }} 
                      <span class="mx-1">|</span>
                      <i class="fas fa-phone me-1"></i>{{ u.persona?.telefono || 'Sin telf.' }}
                    </div>
                  </div>
                </div>
              </div>

              <div *ngIf="obtenerUsuariosPorCat(cat.id).length === 0" class="p-4 text-center text-muted small italic">
                <i class="fas fa-info-circle me-1"></i> No hay personal asignado
              </div>
            </div>

            <div class="card-footer bg-white border-0 text-end">
              <button class="btn btn-link btn-sm text-danger p-0" (click)="eliminar(cat.id)" title="Eliminar Categoría">
                <i class="fas fa-trash-alt"></i>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<style>
  /* Estilos personalizados para los círculos de avatar */
  .avatar-circle {
    width: 32px;
    height: 32px;
    line-height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Mejora del scrollbar para las listas largas */
  .list-group::-webkit-scrollbar {
    width: 5px;
  }
  .list-group::-webkit-scrollbar-track {
    background: #f1f1f1;
  }
  .list-group::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 10px;
  }
  .list-group::-webkit-scrollbar-thumb:hover {
    background: #999;
  }

  /* Animación suave al pasar el mouse por los items */
  .list-group-item-action:hover {
    background-color: #f8f9fa !important;
    transition: background-color 0.2s ease;
  }
</style>
